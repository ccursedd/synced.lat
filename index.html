<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>secure view</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      position: relative;
    }
    #snowfall {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .snowflake {
      position: absolute;
      top: -10px;
      color: rgba(255,255,255,0.15);
      font-size: 12px;
      animation: fall linear infinite;
      user-select: none;
      pointer-events: none;
    }
    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.05; }
    }
    .card {
      background: linear-gradient(145deg, #111111, #1e1e1e);
      max-width: 520px;
      width: 90%;
      padding: 2.8rem 2.2rem;
      border-radius: 1.8rem;
      border: 1px solid #2a2a2a;
      box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.02);
      text-align: center;
      position: relative;
      z-index: 1;
    }
    h1 {
      color: #e8e8e8;
      font-weight: 200;
      font-size: 2.6rem;
      letter-spacing: 4px;
      margin-bottom: 0.3rem;
      text-shadow: 0 2px 20px rgba(255,255,255,0.03);
    }
    .subtitle {
      color: #666;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.5rem 0;
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
      display: inline-block;
      margin: 0.8rem 0 1.8rem;
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0% { opacity: 0.4; letter-spacing: 3px; }
      50% { opacity: 1; letter-spacing: 5px; }
      100% { opacity: 0.4; letter-spacing: 3px; }
    }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      margin: 1.5rem 0 1.2rem;
    }
    .status-item {
      background: #151515;
      padding: 0.8rem 0.2rem;
      border-radius: 1rem;
      border: 1px solid #242424;
    }
    .status-label {
      display: block;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #555;
      margin-bottom: 0.2rem;
      font-weight: 400;
    }
    .status-value {
      font-weight: 400;
      font-size: 0.9rem;
      color: #bbb;
      letter-spacing: 0.3px;
    }
    .status-value .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .dot.green { background: #4a4a4a; }
    .dot.yellow { background: #6a6a6a; }
    .dot.red { background: #5a5a5a; }
    .footnote {
      margin-top: 1.5rem;
      color: #333;
      font-size: 0.6rem;
      letter-spacing: 1px;
      border-top: 1px solid #1a1a1a;
      padding-top: 1.2rem;
    }
    .footnote span {
      background: #121212;
      padding: 0.15rem 1rem;
      border-radius: 20px;
      color: #555;
      border: 1px solid #202020;
    }
    .alert-banner {
      background: #141414;
      border-left: 3px solid #444;
      color: #888;
      padding: 0.5rem 0.8rem;
      border-radius: 0.6rem;
      margin-top: 1rem;
      font-size: 0.75rem;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      letter-spacing: 0.3px;
    }
    .alert-banner.show {
      display: flex;
    }
  </style>
</head>
<body>

<div id="snowfall"></div>

<div class="card">
  <h1>secure view</h1>
  <div class="subtitle">protection active</div>

  <div class="status-grid">
    <div class="status-item">
      <span class="status-label">adblock</span>
      <span class="status-value" id="adblockStatus"><span class="dot green"></span> clear</span>
    </div>
    <div class="status-item">
      <span class="status-label">devtools</span>
      <span class="status-value" id="devtoolsStatus"><span class="dot green"></span> closed</span>
    </div>
    <div class="status-item">
      <span class="status-label">source view</span>
      <span class="status-value" id="sourceStatus"><span class="dot green"></span> locked</span>
    </div>
    <div class="status-item">
      <span class="status-label">page save</span>
      <span class="status-value" id="downloadStatus"><span class="dot green"></span> allowed</span>
    </div>
  </div>

  <div id="alertBox" class="alert-banner">
    <span id="alertMessage">action prevented</span>
  </div>

  <div class="footnote">
    <span>black & white gradient</span>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---- SNOWFALL ----
    (function createSnow() {
      const container = document.getElementById('snowfall');
      const chars = ['•', '◦', '❄', '❅', '✦'];
      for (let i = 0; i < 55; i++) {
        const el = document.createElement('div');
        el.className = 'snowflake';
        el.textContent = chars[Math.floor(Math.random() * chars.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (5 + Math.random() * 14) + 'px';
        el.style.animationDuration = (10 + Math.random() * 20) + 's';
        el.style.animationDelay = (Math.random() * 15) + 's';
        container.appendChild(el);
      }
    })();

    // ---- DOM REFS ----
    const adblockEl = document.getElementById('adblockStatus');
    const devtoolsEl = document.getElementById('devtoolsStatus');
    const sourceEl = document.getElementById('sourceStatus');
    const downloadEl = document.getElementById('downloadStatus');
    const alertBox = document.getElementById('alertBox');
    const alertMsg = document.getElementById('alertMessage');

    function setStatus(el, label, dotColor) {
      el.innerHTML = '<span class="dot ' + dotColor + '"></span> ' + label;
    }

    function showAlert(msg) {
      alertMsg.textContent = msg;
      alertBox.classList.add('show');
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 2200);
    }

    // ============================================================
    // URL ROTATOR — 24‑character random string, ultra fast
    // ============================================================
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789&@#^%*!~-_';
    const baseUrl = window.location.origin + window.location.pathname;

    function random24() {
      let s = '';
      for (let i = 0; i < 24; i++) {
        s += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return s;
    }

    function rotateUrl() {
      const full = baseUrl + '?' + random24();
      try {
        history.replaceState({}, '', full);
      } catch (_) {}
    }

    // 5 concurrent loops = maximum speed without blocking UI
    function raf() { rotateUrl(); requestAnimationFrame(raf); }
    function to()  { rotateUrl(); setTimeout(to, 0); }
    function iv()  { rotateUrl(); }

    raf();
    to();
    setInterval(iv, 0);

    // MessageChannel for microtask‑level speed
    const ch = new MessageChannel();
    ch.port1.onmessage = () => { rotateUrl(); ch.port2.postMessage(null); };
    ch.port2.postMessage(null);

    // setImmediate fallback (if available)
    if (typeof setImmediate !== 'undefined') {
      (function imm() { rotateUrl(); setImmediate(imm); })();
    }

    // ---- CLOSE TAB ----
    function closeTab() {
      try { window.close(); } catch (_) {}
      window.open('', '_self', '');
      window.close();
    }

    // ---- ADBLOCK DETECTION ----
    (function detectAdBlock() {
      const bait = document.createElement('div');
      bait.className = 'adsbox ad ad-banner';
      bait.style.cssText = 'position:absolute;left:-9999px;top:-9999px;height:1px;width:1px;';
      bait.innerHTML = '&nbsp;';
      document.body.appendChild(bait);

      const testAd = document.createElement('div');
      testAd.className = 'ad-unit';
      testAd.style.cssText = 'position:absolute;left:-9999px;top:-9999px;height:1px;width:1px;';
      testAd.innerHTML = '&nbsp;';
      document.body.appendChild(testAd);

      const check = function() {
        let blocked = false;
        if (bait.offsetHeight === 0 || bait.offsetParent === null) blocked = true;
        else if (testAd.offsetHeight === 0 || testAd.offsetParent === null) blocked = true;
        else {
          const style = window.getComputedStyle(bait);
          if (style.display === 'none' || style.visibility === 'hidden') blocked = true;
        }
        if (blocked) {
          setStatus(adblockEl, 'detected', 'yellow');
          showAlert('adblocker detected');
        } else {
          setStatus(adblockEl, 'clear', 'green');
        }
        bait.remove();
        testAd.remove();
      };

      if (document.readyState === 'complete') check();
      else window.addEventListener('load', check);
    })();

    // ---- DEVTOOLS DETECTION + CLOSE ----
    let devtoolsOpen = false;
    function devtoolsCheck() {
      const threshold = 160;
      const wDiff = window.outerWidth - window.innerWidth;
      const hDiff = window.outerHeight - window.innerHeight;
      const isOpen = (wDiff > threshold || hDiff > threshold);
      if (isOpen !== devtoolsOpen) {
        devtoolsOpen = isOpen;
        if (devtoolsOpen) {
          setStatus(devtoolsEl, 'detected', 'yellow');
          showAlert('devtools detected - closing tab');
          setTimeout(closeTab, 300);
        } else {
          setStatus(devtoolsEl, 'closed', 'green');
        }
      }
    }
    setInterval(devtoolsCheck, 500);
    window.addEventListener('resize', devtoolsCheck);
    setTimeout(devtoolsCheck, 300);

    // ---- CTRL+U (source) - CLOSE ----
    document.addEventListener('keydown', function(e) {
      const key = e.key || e.keyCode;
      if (e.ctrlKey && (key === 'u' || key === 'U' || key === 85)) {
        e.preventDefault();
        e.stopPropagation();
        setStatus(sourceEl, 'blocked', 'red');
        showAlert('ctrl+u blocked - closing');
        setTimeout(closeTab, 200);
        return false;
      }
      return true;
    }, true);

    // ---- RIGHT CLICK - CLOSE ----
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      showAlert('right click blocked');
      setTimeout(closeTab, 300);
      return false;
    }, true);

    // ---- F12 - CLOSE ----
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || e.keyCode === 123) {
        e.preventDefault();
        setStatus(devtoolsEl, 'blocked', 'red');
        showAlert('f12 blocked - closing');
        setTimeout(closeTab, 200);
        return false;
      }
    }, true);

    // ---- CTRL+SHIFT+I / J / C - CLOSE ----
    document.addEventListener('keydown', function(e) {
      const ctrl = e.ctrlKey || e.metaKey;
      const shift = e.shiftKey;
      const key = e.key || e.keyCode;
      if (ctrl && shift && (key === 'i' || key === 'I' || key === 73)) {
        e.preventDefault();
        setStatus(devtoolsEl, 'blocked', 'red');
        showAlert('devtools shortcut - closing');
        setTimeout(closeTab, 200);
        return false;
      }
      if (ctrl && shift && (key === 'j' || key === 'J' || key === 74)) {
        e.preventDefault();
        setStatus(devtoolsEl, 'blocked', 'red');
        showAlert('console shortcut - closing');
        setTimeout(closeTab, 200);
        return false;
      }
      if (ctrl && shift && (key === 'c' || key === 'C' || key === 67)) {
        e.preventDefault();
        setStatus(devtoolsEl, 'blocked', 'red');
        showAlert('inspect shortcut - closing');
        setTimeout(closeTab, 200);
        return false;
      }
    }, true);

    // ---- COPY/CUT - BLOCK ----
    document.addEventListener('copy', function(e) {
      e.preventDefault();
      showAlert('copy blocked');
      return false;
    }, true);
    document.addEventListener('cut', function(e) {
      e.preventDefault();
      showAlert('cut blocked');
      return false;
    }, true);

    // ---- PAGE SAVE (CTRL+S) - ALLOWED ----
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.keyCode === 83)) {
        setStatus(downloadEl, 'allowed', 'green');
        showAlert('page save allowed');
        return true;
      }
      if (e.ctrlKey && e.shiftKey && (e.key === 'S' || e.key === 's' || e.keyCode === 83)) {
        e.preventDefault();
        setStatus(downloadEl, 'blocked', 'red');
        showAlert('save as blocked');
        return false;
      }
      if (e.ctrlKey && (e.key === 'p' || e.key === 'P' || e.keyCode === 80)) {
        e.preventDefault();
        setStatus(downloadEl, 'blocked', 'red');
        showAlert('print blocked');
        return false;
      }
      return true;
    }, true);

    // ---- DRAG/DROP BLOCK ----
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
      showAlert('drag blocked');
      return false;
    }, true);
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      showAlert('drop blocked');
      return false;
    }, true);
    document.addEventListener('dragover', function(e) {
      e.preventDefault();
      return false;
    }, true);

    // ---- SELECTION BLOCK ----
    document.addEventListener('selectstart', function(e) {
      e.preventDefault();
      return false;
    }, true);

    // ---- BEFOREUNLOAD ----
    window.addEventListener('beforeunload', function(e) {
      if (devtoolsOpen) {
        setStatus(downloadEl, 'attempted', 'yellow');
      }
    });

    // ---- INIT STATUS ----
    setStatus(adblockEl, 'clear', 'green');
    setStatus(devtoolsEl, 'closed', 'green');
    setStatus(sourceEl, 'locked', 'green');
    setStatus(downloadEl, 'allowed', 'green');

    setTimeout(devtoolsCheck, 400);

    // ---- SILENCE CONSOLE ----
    console.log = function() {};
    console.warn = function() {};
    console.error = function() {};
    console.table = function() {};
    console.group = function() {};
    console.groupEnd = function() {};
    console.debug = function() {};

  })();
</script>
</body>
</html>
