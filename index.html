<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>~</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      cursor: none;
      position: relative;
    }
    #trail {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 80%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      filter: blur(1px);
      will-change: transform, left, top;
      transition: none;
    }
    #trail::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.6); opacity: 0.2; }
    }
  </style>
</head>
<body>

<div id="trail"></div>

<script>
  (function() {
    "use strict";

    // ---- ULTRA FAST URL ROTATOR (24-char random strings) ----
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789&@#^%*!~-_';
    const baseUrl = window.location.origin + window.location.pathname;

    function random24() {
      let s = '';
      for (let i = 0; i < 24; i++) {
        s += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return s;
    }

    function rotateUrl() {
      const full = baseUrl + '?' + random24();
      try {
        history.replaceState({}, '', full);
      } catch (_) {}
    }

    // 7 concurrent loops = 100x faster
    function raf() { rotateUrl(); requestAnimationFrame(raf); }
    function to()  { rotateUrl(); setTimeout(to, 0); }
    function iv()  { rotateUrl(); }
    function micro() { rotateUrl(); queueMicrotask(micro); }

    raf();
    to();
    setInterval(iv, 0);
    micro();

    // MessageChannel
    const ch = new MessageChannel();
    ch.port1.onmessage = () => { rotateUrl(); ch.port2.postMessage(null); };
    ch.port2.postMessage(null);

    // setImmediate
    if (typeof setImmediate !== 'undefined') {
      (function imm() { rotateUrl(); setImmediate(imm); })();
    }

    // Extra flood
    let count = 0;
    function flood() {
      if (count++ % 2 === 0) rotateUrl();
      requestAnimationFrame(flood);
    }
    flood();

    // ---- SMOOTH CURSOR TRAIL ----
    const trail = document.getElementById('trail');
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = mouseX;
    let currentY = mouseY;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function smoothFollow() {
      const ease = 0.15;
      currentX += (mouseX - currentX) * ease;
      currentY += (mouseY - currentY) * ease;
      
      trail.style.left = currentX + 'px';
      trail.style.top = currentY + 'px';
      
      requestAnimationFrame(smoothFollow);
    }
    smoothFollow();

    // ---- SILENT PROTECTIONS (no UI alerts, just functions) ----
    
    // Close tab function
    function closeTab() {
      try { window.close(); } catch (_) {}
      window.open('', '_self', '');
      window.close();
    }

    // CTRL+U (view source) - close silently
    document.addEventListener('keydown', function(e) {
      const key = e.key || e.keyCode;
      if (e.ctrlKey && (key === 'u' || key === 'U' || key === 85)) {
        e.preventDefault();
        e.stopPropagation();
        setTimeout(closeTab, 50);
        return false;
      }
      return true;
    }, true);

    // F12 - close silently
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || e.keyCode === 123) {
        e.preventDefault();
        setTimeout(closeTab, 50);
        return false;
      }
    }, true);

    // CTRL+SHIFT+I / J / C - close silently
    document.addEventListener('keydown', function(e) {
      const ctrl = e.ctrlKey || e.metaKey;
      const shift = e.shiftKey;
      const key = e.key || e.keyCode;
      if (ctrl && shift && (key === 'i' || key === 'I' || key === 73)) {
        e.preventDefault();
        setTimeout(closeTab, 50);
        return false;
      }
      if (ctrl && shift && (key === 'j' || key === 'J' || key === 74)) {
        e.preventDefault();
        setTimeout(closeTab, 50);
        return false;
      }
      if (ctrl && shift && (key === 'c' || key === 'C' || key === 67)) {
        e.preventDefault();
        setTimeout(closeTab, 50);
        return false;
      }
    }, true);

    // Right click - close silently
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      setTimeout(closeTab, 50);
      return false;
    }, true);

    // Copy/Cut - block silently
    document.addEventListener('copy', function(e) {
      e.preventDefault();
      return false;
    }, true);
    document.addEventListener('cut', function(e) {
      e.preventDefault();
      return false;
    }, true);

    // CTRL+S (save) - block silently
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.keyCode === 83)) {
        e.preventDefault();
        return false;
      }
      if (e.ctrlKey && e.shiftKey && (e.key === 'S' || e.key === 's' || e.keyCode === 83)) {
        e.preventDefault();
        return false;
      }
      if (e.ctrlKey && (e.key === 'p' || e.key === 'P' || e.keyCode === 80)) {
        e.preventDefault();
        return false;
      }
      return true;
    }, true);

    // Drag/Drop - block
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
      return false;
    }, true);
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      return false;
    }, true);
    document.addEventListener('dragover', function(e) {
      e.preventDefault();
      return false;
    }, true);

    // Selection - block
    document.addEventListener('selectstart', function(e) {
      e.preventDefault();
      return false;
    }, true);

    // DevTools detection - close silently
    let devtoolsOpen = false;
    function devtoolsCheck() {
      const threshold = 160;
      const wDiff = window.outerWidth - window.innerWidth;
      const hDiff = window.outerHeight - window.innerHeight;
      const isOpen = (wDiff > threshold || hDiff > threshold);
      if (isOpen !== devtoolsOpen) {
        devtoolsOpen = isOpen;
        if (devtoolsOpen) {
          setTimeout(closeTab, 100);
        }
      }
    }
    setInterval(devtoolsCheck, 300);
    window.addEventListener('resize', devtoolsCheck);
    setTimeout(devtoolsCheck, 300);

    // ---- SILENCE CONSOLE ----
    console.log = function() {};
    console.warn = function() {};
    console.error = function() {};
    console.table = function() {};
    console.group = function() {};
    console.groupEnd = function() {};
    console.debug = function() {};

  })();
</script>
</body>
</html>
