<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>synced.lat — 404</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#000;--fg:#fff;--muted:rgba(255,255,255,0.35);--border:rgba(255,255,255,0.08);--panel:rgba(255,255,255,0.04);}
    body{background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;}

    canvas#bg-canvas{position:fixed;inset:0;z-index:0;}

    .bg-gradient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 40%, rgba(120,80,255,0.06) 0%, transparent 50%),radial-gradient(ellipse at 20% 80%, rgba(0,200,255,0.04) 0%, transparent 40%),radial-gradient(ellipse at 80% 20%, rgba(255,0,120,0.04) 0%, transparent 40%);pointer-events:none;}

    .container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center;padding:2rem;gap:2rem;opacity:0;animation:fadeUp 1s ease 0.2s forwards;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    .code-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
    .code{font-size:clamp(7rem,18vw,12rem);font-weight:900;letter-spacing:-0.06em;line-height:1;position:relative;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,0.12);user-select:none;}
    .code-fill{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(255,255,255,0.9) 0%,rgba(160,120,255,0.8) 40%,rgba(0,200,255,0.7) 70%,rgba(255,255,255,0.6) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:0;animation:codeGlow 4s ease-in-out infinite alternate;}
    @keyframes codeGlow{0%{filter:brightness(0.9) drop-shadow(0 0 20px rgba(120,80,255,0.2))}100%{filter:brightness(1.1) drop-shadow(0 0 40px rgba(120,80,255,0.35))}}

    .code-glitch{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none;}
    .code-glitch::before,.code-glitch::after{content:'404';position:absolute;top:0;left:0;width:100%;font-size:clamp(7rem,18vw,12rem);font-weight:900;letter-spacing:-0.06em;line-height:1;}
    .code-glitch::before{color:rgba(255,0,100,0.4);animation:glitchA 3s infinite;clip-path:polygon(0 0,100% 0,100% 45%,0 45%);}
    .code-glitch::after{color:rgba(0,200,255,0.4);animation:glitchB 2.5s infinite;clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%);}
    @keyframes glitchA{0%,88%,100%{transform:translateX(0)}90%{transform:translateX(-6px) skew(2deg)}92%{transform:translateX(8px)}94%{transform:translateX(-3px)}}
    @keyframes glitchB{0%,85%,100%{transform:translateX(0)}87%{transform:translateX(5px) skew(-1deg)}89%{transform:translateX(-7px)}91%{transform:translateX(4px)}}

    .orbit{position:absolute;width:280px;height:280px;border-radius:50%;border:1px solid rgba(255,255,255,0.04);animation:orbitSpin 20s linear infinite;pointer-events:none;}
    .orbit:nth-child(2){width:380px;height:380px;animation-duration:30s;animation-direction:reverse;border-color:rgba(255,255,255,0.03);}
    .orbit-dot{position:absolute;width:5px;height:5px;background:rgba(255,255,255,0.25);border-radius:50%;top:-2.5px;left:50%;box-shadow:0 0 8px rgba(255,255,255,0.15);}
    @keyframes orbitSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    .msg{display:flex;flex-direction:column;align-items:center;gap:0.6rem;}
    .msg-title{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;}
    .msg-sub{font-size:0.88rem;color:var(--muted);max-width:340px;line-height:1.6;}

    .actions{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;}
    .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.7rem 1.5rem;border-radius:10px;font-size:0.85rem;font-weight:600;font-family:inherit;text-decoration:none;cursor:pointer;transition:all 0.25s ease;border:none;}
    .btn-primary{background:var(--fg);color:#000;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,255,255,0.12);}
    .btn-ghost{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border:1px solid var(--border);}
    .btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--fg);border-color:rgba(255,255,255,0.15);transform:translateY(-2px);}

    .hint{font-size:0.7rem;color:rgba(255,255,255,0.15);letter-spacing:0.04em;}
    .hint code{background:rgba(255,255,255,0.06);padding:0.15rem 0.4rem;border-radius:4px;font-family:inherit;font-size:0.7rem;}

    .scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.03) 20%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.03) 80%,transparent 100%);z-index:5;animation:scanMove 6s linear infinite;pointer-events:none;}
    @keyframes scanMove{0%{top:-2px}100%{top:100vh}}

    @media(max-width:500px){
      .code{font-size:6rem;}
      .orbit{width:200px;height:200px;}
      .orbit:nth-child(2){width:260px;height:260px;}
      .msg-sub{font-size:0.82rem;}
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="bg-gradient"></div>
  <div class="scanline"></div>

  <div class="container">
    <div class="code-wrap">
      <div class="orbit" style="top:50%;left:50%;transform:translate(-50%,-50%)">
        <div class="orbit-dot"></div>
      </div>
      <div class="orbit" style="top:50%;left:50%;transform:translate(-50%,-50%)">
        <div class="orbit-dot"></div>
      </div>
      <div class="code">404</div>
      <div class="code-fill">404</div>
      <div class="code-glitch"></div>
    </div>

    <div class="msg">
      <div class="msg-title">Page not found</div>
      <div class="msg-sub">This page doesn't exist or has been moved. Maybe the username was never claimed.</div>
    </div>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go home
      </a>
      <a href="/dashboard.html" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Claim a username
      </a>
    </div>

    <div class="hint">synced.lat/<code>yourname</code></div>
  </div>

  <script>
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  function rsz(){c.width=innerWidth;c.height=innerHeight;}
  rsz();window.addEventListener('resize',rsz);

  const pts=[];
  for(let i=0;i<60;i++)pts.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:0.5+Math.random()*1.5,
    vx:(Math.random()-0.5)*0.15,
    vy:(Math.random()-0.5)*0.15,
    op:0.08+Math.random()*0.2
  });

  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const p of pts){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.op})`;
      ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-5)p.x=c.width+5;if(p.x>c.width+5)p.x=-5;
      if(p.y<-5)p.y=c.height+5;if(p.y>c.height+5)p.y=-5;
    }
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(255,255,255,${0.03*(1-dist/120)})`;
          ctx.lineWidth=0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  })();
  </script>
</body>
</html>
